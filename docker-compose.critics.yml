# ==============================================================================
# Critics stats overlay — per-critic cost logging for Nav2 MPPI controller
# ==============================================================================
# Add to COMPOSE_FILE in .env to enable (append after robot or sim overlay):
#   COMPOSE_FILE=docker-compose.core.yml:docker-compose.sim.yml:docker-compose.critics.yml
#
# Builds a separate image on top of ros2-jazzy-nav2:latest with:
#   - nav2_critics_msgs package (CriticsStats.msg)
#   - Patched nav2_mppi_controller publishing ~/critics_stats each control tick
#
# Enable publishing in nav2_params.yaml:
#   controller_server:
#     ros__parameters:
#       FollowPath:
#         publish_critics_stats: true
#
# Subscribe to: /controller_server/critics_stats (nav2_critics_msgs/msg/CriticsStats)
# Fields: stamp, critics[] (names), changed[] (bool), costs_sum[] (float32)
#
# Rebuild after source changes:
#   docker compose build jetacker-controller-server
#   # Re-extract Python msgs for test-drive bag recording:
#   docker run --rm --entrypoint bash ros2-jazzy-critics:latest \
#     -c "tar cf - -C /workspace/install nav2_critics_msgs" \
#     | tar xf - -C workdir/critics_install/

services:
  jetacker-controller-server:
    image: ros2-jazzy-critics:latest
    build:
      context: .
      dockerfile: docker/critics/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO}

  # Share critics_msgs Python package with test-drive for bag recording
  test-drive:
    volumes:
      - ./workdir/critics_install/nav2_critics_msgs:/workspace/critics_install/nav2_critics_msgs:ro
