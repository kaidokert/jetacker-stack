waypoints:
- name: "Matrix 3: 90° left arc forward (with mid-path obstacle)"
  x: 1.0
  y: 1.0
  heading_deg: 90.0
  tolerance_xy: 0.25
  tolerance_yaw: 0.25
  timeout: 65.0
  qx: 0.0
  qy: 0.0
  qz: 0.7071067811865476
  qw: 0.7071067811865476

obstacles:
  - name: "m3_mid_capsule"
    spawn_at: 0.5           # seconds after navigation goal sent
    pose:
      x: 0.60
      y: 0.12
      z: 0.50               # drop from above so gravity is visible
      # Lay sideways: 90° rotation around X axis (long axis along Y)
      qx: 0.7071067811865475
      qy: 0.0
      qz: 0.0
      qw: 0.7071067811865476
    shape: capsule
    size:
      radius: 0.08
      length: 0.20
