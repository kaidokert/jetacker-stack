# Matrix Test 7: Forward 180° Turn
# Validate: Full semicircle at minimum radius (tests sustained turning)

kP: 1.5
min_velocity: 0.05

instructions:
  - type: rotation
    degrees: 180.0  # Full semicircle LEFT
    speed: 0.4  # Angular speed in rad/s (~23°/s)
    forward_velocity: 0.184  # Linear velocity = angular_speed * radius = 0.4 * 0.46
    kP_angular: 2.0
    min_angular_velocity: 0.1
    kP_linear: 0.5
    min_linear_velocity: 0.03
    timeout: 20.0  # Longer timeout for 180° turn
    description: "180° continuous arc at minimum radius (0.46m)"

  - type: pause
    seconds: 2.0
    description: "Settle before measurement"
