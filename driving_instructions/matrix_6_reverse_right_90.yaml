# Matrix Test 6: Reverse 90° Right Arc
# Validate: Minimum radius right turn in reverse direction

kP: 1.5
min_velocity: 0.05

instructions:
  - type: rotation
    degrees: 90.0  # RIGHT turn in reverse (positive = CCW heading, backs RIGHT for Ackermann)
    speed: 0.4  # Angular speed in rad/s (~23°/s)
    forward_velocity: -0.36  # NEGATIVE = reverse (angular_speed * radius = 0.4 * 0.85)
    kP_angular: 2.0
    min_angular_velocity: 0.1
    kP_linear: 0.5
    min_linear_velocity: 0.03
    timeout: 15.0
    description: "90° right arc in REVERSE at radius (0.70m)"

  - type: pause
    seconds: 2.0
    description: "Settle before measurement"
