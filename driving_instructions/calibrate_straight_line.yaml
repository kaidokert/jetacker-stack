# Straight-line calibration test
# Tests motor_cmd_per_rad_s accuracy
#
# PROCEDURE:
# 1. Mark robot's starting position on the ground (tape or chalk)
# 2. Run this test
# 3. Measure actual physical distance traveled
# 4. Compare to commanded distance (2.0m)
# 5. Calculate correction factor: correction = actual_distance / 2.0
# 6. Adjust motor_cmd_per_rad_s: new_value = current_value / correction
#
# Example:
#   Current motor_cmd_per_rad_s: 0.174
#   Robot travels 2.3m instead of 2.0m
#   Correction: 2.3 / 2.0 = 1.15 (robot goes 15% too far)
#   New value: 0.174 / 1.15 = 0.151
#
# If robot under-shoots (travels 1.8m):
#   Correction: 1.8 / 2.0 = 0.9 (robot goes 10% too short)
#   New value: 0.174 / 0.9 = 0.193

instructions:
  - type: pause
    seconds: 1.0
    description: "Initial pause - capture resting state"

  - type: distance
    meters: 2.0
    speed: 0.3
    timeout: 10.0
    description: "Drive 2.0m forward at moderate speed (10s timeout for wall collision)"

  - type: pause
    seconds: 1.0
    description: "Final pause - capture resting state"
