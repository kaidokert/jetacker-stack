# Matrix Test 3: Forward 90° Left Arc
# Validate: Minimum radius left turn in forward direction

kP: 1.5
min_velocity: 0.05

instructions:
  - type: rotation
    degrees: 90.0  # LEFT turn (positive)
    speed: 0.4  # Angular speed in rad/s (~23°/s)
    forward_velocity: 0.184  # Linear velocity = angular_speed * radius = 0.4 * 0.46
    kP_angular: 2.0
    min_angular_velocity: 0.1
    kP_linear: 0.5
    min_linear_velocity: 0.03
    timeout: 15.0
    description: "90° left arc at minimum radius (0.46m)"

  - type: pause
    seconds: 2.0
    description: "Settle before measurement"
