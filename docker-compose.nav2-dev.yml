services:
  nav2-dev:
    image: ros2-jazzy-critics:latest
    build:
      context: .
      dockerfile: docker/critics/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO}
    container_name: nav2-dev
    working_dir: /workspace/navigation2
    stdin_open: true
    tty: true
    restart: "no"
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      USE_SIM_TIME: ${USE_SIM_TIME}
    volumes:
      - ./workdir/ref/navigation2:/workspace/navigation2
      - ./workdir/nav2_build:/workspace/nav2_build
    command: sleep infinity
