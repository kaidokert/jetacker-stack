# Health Check Configuration for Test Drive Node
# Defines required topics, transforms, and minimum sample rates
# All checks must pass before test execution begins

health_checks:
  # Timeout for health check completion (seconds)
  timeout: 10.0

  # Sample duration for rate checks (seconds)
  sample_duration: 1.0

  # Required topics with minimum rates
  topics:
    # Controller odometry - raw wheel encoder data
    - topic: /diff_drive_controller/odom
      message_type: nav_msgs/msg/Odometry
      min_rate_hz: 10.0
      required_fields:
        - pose.pose.position.x
        - pose.pose.position.y
        - twist.twist.linear.x
      description: "Controller odometry from wheel encoders"

    # EKF filtered odometry - sensor fusion output
    - topic: /odometry/filtered
      message_type: nav_msgs/msg/Odometry
      min_rate_hz: 5.0
      required_fields:
        - pose.pose.position.x
        - pose.pose.position.y
      description: "EKF fused odometry"

    # IMU data - raw from Gazebo simulation (no filtering)
    - topic: /slam_bot/imu
      message_type: sensor_msgs/msg/Imu
      min_rate_hz: 10.0
      required_fields:
        - orientation.w
        - angular_velocity.z
        - linear_acceleration.x
      description: "Raw IMU data from Gazebo (imu_filter_madgwick disabled)"

    # Joint states - wheel position and velocity
    - topic: /joint_states
      message_type: sensor_msgs/msg/JointState
      min_rate_hz: 10.0
      required_fields:
        - position
        - velocity
      description: "Joint states from gz_ros2_control"

  # Required TF transforms
  transforms:
    - parent_frame: odom
      child_frame: base_link
      max_age_sec: 0.5
      description: "Odometry to base_link (published by EKF)"

    - parent_frame: base_link
      child_frame: imu_link
      max_age_sec: 3600.0  # 1 hour - static transforms don't update
      description: "Base link to IMU (static from robot_state_publisher)"
