# NOTE: use_sim_time is set via USE_SIM_TIME env var in docker-compose,
# passed as -p use_sim_time:=${USE_SIM_TIME} on the command line.
# Do NOT add use_sim_time to this file.
controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Wheel joints
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Wheel geometry
    wheel_separation: 0.208342
    wheel_radius: 0.05

    # Multipliers for realistic errors (start with 1.0, can add errors later)
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Publishing
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link

    # Publish odom->base_link TF (disabled - EKF will publish filtered transform)
    enable_odom_tf: false

    # Open loop odometry (computed from wheel velocities, no feedback)
    open_loop: false

    # Command velocity timeout
    cmd_vel_timeout: 0.5

    # Velocity and acceleration limits
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.8
        min_velocity: -0.8
        has_acceleration_limits: true
        max_acceleration: 1.0
        min_acceleration: -1.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.5
        min_velocity: -1.5
        has_acceleration_limits: true
        max_acceleration: 2.0
        min_acceleration: -2.0

joint_state_broadcaster:
  ros__parameters: {}
