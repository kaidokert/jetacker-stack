# ===========================================================================
# NOT tunable (static or dangerous)
# ===========================================================================
#
# controller_frequency: 20.0
#   Explicitly ParameterType::Static. Needs node restart.
#   Could do "half reset" but deprioritized.
#
# motion_model: "Ackermann"
#   Dangling reference bug — changing at runtime causes segfault.
#   NEVER change.
#
# ConstraintCritic reads vx_max/vx_min via getParentParam but derived
#   values (max_vel_, min_vel_) are NOT recomputed. Same for
#   PathAngleCritic (reversing_allowed_). Upstream bug.
#
# time_steps: 80
#   Live-tunable but locked — changes array sizes and interacts with
#   batch_size. Keep fixed unless explicitly investigating.
