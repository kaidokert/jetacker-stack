### ekf_filter_node config for Jetacker - fusing wheel odometry + IMU
# Reference: http://docs.ros.org/en/jazzy/p/robot_localization/

ekf_filter_node:
  ros__parameters:
    # Note: use_sim_time set via USE_SIM_TIME env var (-p use_sim_time:=${USE_SIM_TIME})
    # Update frequency (Hz)
    frequency: 10.0

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link  # Changed to base_link to match Nav2 expectations
    world_frame: odom

    # Sensor timeout (seconds) - if no data received, sensor is ignored
    sensor_timeout: 1.0

    # Whether to broadcast odom->base_link transform
    # Set to true so EKF publishes the filtered transform (controller will NOT publish)
    publish_tf: true

    # Enable diagnostics so freq_diag_->tick() fires on each publish.
    # Without this, robot_localization still registers the frequency
    # diagnostic but never ticks it, causing a permanent ERROR on
    # /diagnostics ("No events recorded").
    print_diagnostics: true

    # 2D mode: zeroes out Z, roll, pitch in the state estimate.
    # Suppresses "unbounded error growth" warnings for unmeasured
    # 3D axes (expected for a flat-floor ground robot).
    two_d_mode: true

    # --- Odometry from wheel encoders (tricycle_steering_controller) ---
    # Topic: /tricycle_steering_controller/odometry
    # We trust: x, y velocities and yaw rate from encoders
    # We DO NOT trust absolute position (due to drift/slip)
    odom0: /tricycle_steering_controller/odometry
    odom0_config: [false, false, false,  # x, y, z position (don't use - drifts)
                   false, false, false,  # roll, pitch, yaw orientation (don't use)
                   true,  true,  false,  # x_dot, y_dot, z_dot velocity (USE - from encoders)
                   false, false, true,   # roll_dot, pitch_dot, yaw_dot (USE yaw_dot from encoders)
                   false, false, false]  # x_ddot, y_ddot, z_ddot acceleration
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # --- IMU sensor data (from Gazebo simulation) ---
    # Topic: /imu/data_raw (matches real robot topic name)
    # IMPORTANT: Gazebo IMU orientation is PERFECT (no noise/drift), unlike real robot
    # Real robot: Madgwick integrates noisy gyro → orientation WITH drift
    # Simulation: To match real behavior, we ONLY use angular velocity, NOT orientation
    # This forces EKF to integrate noisy gyro data → realistic drift
    # We trust: ONLY yaw_dot (angular velocity) - forces integration like real robot
    # We DO NOT trust: orientation (perfect in Gazebo), linear acceleration (noisy)
    imu0: /imu/data_raw
    imu0_config: [false, false, false,  # x, y, z position
                  false, false, false,  # roll, pitch, yaw (DISABLED - Gazebo orientation is perfect)
                  false, false, false,  # x_dot, y_dot, z_dot velocity
                  false, false, true,   # roll_dot, pitch_dot, yaw_dot (USE yaw_dot only)
                  false, false, false]  # x_ddot, y_ddot, z_ddot acceleration
    imu0_differential: false
    imu0_relative: true  # Treat first measurement as zero point (matches real robot)
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
