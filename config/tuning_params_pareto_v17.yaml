# Pareto Front PFC+PAC Study v17 — M7 Forward 180° with Ghost Extension
#
# Ghost extension active: projects synthetic path through cusps.
# 3-segment execution: FWD arc → REV backup → FWD arc to goal.
# Reversals are EXPECTED (2 per maneuver) — not penalized.
#
# Key changes from v16:
#   - Objectives: time, pfc_mean, error_yaw, consistency (NO reversals)
#   - inversion_xy_tolerance locked at 0.15 (tight, drives full arc)
#   - inversion_yaw_tolerance locked at 0.35 (allows cusp 2 handoff)
#   - ghost_max_extension locked at 0.70
#   - min_inversion_horizon sampled [0.40, 1.00] (wider range)
#   - PFC range [40, 200] (covers both careful and aggressive)
#
# 5 reps per trial for reliability scoring

# --- SAMPLED PARAMS (7) ---

PathFollowCritic.cost_weight:
  ros_path: "controller_server:FollowPath.PathFollowCritic.cost_weight"
  baseline: 51.0
  range: [40, 200]
  type: float
  scale: log
  tier: 1

