# Bridge configuration for SLAM bot
# Maps ROS2 topics to Gazebo topics for navigation and SLAM

# Command velocity (ROS2 -> Gazebo)
- ros_topic_name: "/slam_bot/cmd_vel"
  gz_topic_name: "/slam_bot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# Odometry (Gazebo -> ROS2)
- ros_topic_name: "/slam_bot/odometry"
  gz_topic_name: "/slam_bot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Laser scan (Gazebo -> ROS2)
- ros_topic_name: "/slam_bot/scan"
  gz_topic_name: "/slam_bot/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# IMU (Gazebo -> ROS2)
- ros_topic_name: "/slam_bot/imu"
  gz_topic_name: "/slam_bot/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# Clock (Gazebo -> ROS2) for simulation time synchronization
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Ground truth pose from SceneBroadcaster (Gazebo -> ROS2)
# Uses SceneBroadcaster's model-specific topic which survives world resets
- ros_topic_name: "/slam_bot/ground_truth"
  gz_topic_name: "/world/slam_world/model/slam_bot/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "gz.msgs.Pose"
  direction: GZ_TO_ROS
